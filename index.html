<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RullX AI - Your personal AI assistant to help with any questions or tasks.">
    <title>RullX AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen">
    
    <nav class="bg-black p-4 w-full">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-white text-lg font-bold">RullX AI</a>
            <ul class="flex space-x-4">
                <li><a href="home.html" class="text-white hover:text-gray-400">Home</a></li>
                <li><a href="about.html" class="text-white hover:text-gray-400">About Me</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="flex-grow flex flex-col justify-center items-center pb-10">
        <div class="text-center">
            <h2 class="text-4xl font-semibold mb-2">RullX AI</h2>
            <h3 class="text-3xl font-bold mb-4">Apa yang bisa saya bantu?</h3>
            <div class="bg-gray-800 p-4 rounded-lg w-96 mt-4">
                <input type="text" id="questionInput" placeholder="Tanyakan apa saja" class="w-full p-2 rounded bg-gray-700 text-white" aria-label="Ask anything">
                <div class="flex justify-between mt-2">
                    <button id="searchButton" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-500 transition duration-300">Cari</button>
                </div>
                <div id="response" class="mt-4 text-white"></div>
            </div>
        </div>
    </div>

    <footer class="bg-black p-4 w-full">
        <div class="container mx-auto text-center">
            <p class="text-white">&copy; 2025 RullX. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const apiKey = 'RullX';
        const apiUrl = 'RullX';

        document.getElementById('searchButton').addEventListener('click', async function() {
            const question = document.getElementById('questionInput').value;
            const responseElement = document.getElementById('response');

            if (!question) {
                responseElement.textContent = 'Silakan masukkan pertanyaan Anda.';
                return;
            }

            responseElement.textContent = 'Memproses...';

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: question }],
                        max_tokens: 150
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices.length > 0) {
                    responseElement.textContent = data.choices[0].message.content;
                } else {
                    responseElement.textContent = 'Maaf, saya tidak bisa menjawab pertanyaan Anda saat ini. Karena masi terdapat kendala pada server.';
                }
            } catch (error) {
                console.error('Error:', error);
                responseElement.textContent = 'Maaf, saya tidak bisa menjawab pertanyaan Anda saat ini. Karena masi terdapat kendala pada server.';
            }
        });
    </script>
</body>
</html>
