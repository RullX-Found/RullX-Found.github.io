<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RullX AI - Asisten AI pribadi Anda untuk membantu dengan pertanyaan atau tugas apa pun.">
    <title>RullX AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi mengetik */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* Animasi kursor */
        @keyframes blink-cursor {
            50% { border-color: transparent; }
        }

        .typing-animation {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid white; /* Kursor */
            animation: typing 2s steps(40, end), blink-cursor 0.75s step-end infinite;
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen">
    
    <nav class="bg-black p-4 w-full">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-white text-lg font-bold">RullX AI</a>
            <ul class="flex space-x-4">
                <li><a href="home.html" class="text-white hover:text-gray-400">Home</a></li>
                <li><a href="betaai.html" class="text-white hover:text-gray-400">Beta AI</a></li>
                <li><a href="about.html" class="text-white hover:text-gray-400">About</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="flex-1 flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-2xl bg-gray-800 p-6 rounded-lg shadow-lg flex flex-col h-[500px]">
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Pesan chat akan dimasukkan di sini -->
            </div>
            <div class="mt-4 flex">
                <input id="user-input" type="text" class="flex-1 p-2 rounded-l-lg bg-gray-700 text-white border-none outline-none" placeholder="Tanyakan sesuatu...">
                <button id="send-btn" class="bg-blue-500 px-4 py-2 rounded-r-lg hover:bg-blue-600">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('send-btn').addEventListener('click', function() {
            const userInput = document.getElementById('user-input').value;
            if (userInput.trim() !== "") {
                addMessageToChatBox('user', userInput);
                const response = getResponse(userInput);
                simulateTyping('ai', response); // Menambahkan efek mengetik
                document.getElementById('user-input').value = '';
            }
        });

        function addMessageToChatBox(sender, message) {
            const chatBox = document.getElementById('chat-box');
            const messageElement = document.createElement('div');
            messageElement.classList.add('flex', 'items-end', sender === 'user' ? 'justify-end' : 'justify-start');
            messageElement.innerHTML = `
                <div class="max-w-xs ${sender === 'user' ? 'bg-blue-500' : 'bg-gray-700'} p-3 rounded-lg">
                    ${message}
                </div>
            `;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function simulateTyping(sender, message) {
            const chatBox = document.getElementById('chat-box');
            const messageElement = document.createElement('div');
            messageElement.classList.add('flex', 'items-end', sender === 'user' ? 'justify-end' : 'justify-start');
            messageElement.innerHTML = `
                <div class="max-w-xs ${sender === 'user' ? 'bg-blue-500' : 'bg-gray-700'} p-3 rounded-lg">
                    <span class="typing-animation"></span>
                </div>
            `;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingElement = messageElement.querySelector('.typing-animation');
            let i = 0;
            const typingInterval = setInterval(() => {
                if (i < message.length) {
                    typingElement.textContent += message[i];
                    i++;
                } else {
                    clearInterval(typingInterval);
                    typingElement.classList.remove('typing-animation'); // Hapus animasi setelah selesai
                    typingElement.style.borderRight = 'none'; // Hilangkan kursor
                }
            }, 50); // Kecepatan mengetik (ms per karakter)
        }

        function getResponse(userInput) {
            const lowerCaseInput = userInput.toLowerCase();

            // Respons dalam bahasa Indonesia
            if (lowerCaseInput.includes('halo') || lowerCaseInput.includes('hai')) {
                return 'Halo! Ada yang bisa saya bantu?';
            } else if (lowerCaseInput.includes('apa kabar')) {
                return 'Saya hanya program, tapi saya berfungsi dengan baik! Bagaimana dengan Anda?';
            } else if (lowerCaseInput.includes('terima kasih') || lowerCaseInput.includes('makasih')) {
                return 'Sama-sama! Senang bisa membantu.';
            } else if (lowerCaseInput.includes('bye') || lowerCaseInput.includes('selamat tinggal')) {
                return 'Selamat tinggal! Semoga harimu menyenangkan!';
            } else if (lowerCaseInput.includes('nama kamu siapa') || lowerCaseInput.includes('siapa kamu')) {
                return 'Nama saya RullX AI, asisten virtual Anda yang bisa menjawab semua pertanyaan. ada yang bisa di bantu?';
            } else if (lowerCaseInput.includes('bantuan') || lowerCaseInput.includes('tolong')) {
                return 'Tentu! Saya bisa membantu menjawab pertanyaan atau memberikan informasi. Coba tanyakan sesuatu.';
            } else if (lowerCaseInput.includes('jam berapa')) {
                const now = new Date();
                return `Sekarang jam ${now.getHours()}:${now.getMinutes()}.`;
            } else if (lowerCaseInput.includes('tanggal berapa')) {
                const now = new Date();
                return `Hari ini tanggal ${now.toLocaleDateString('id-ID')}.`;
            } else if (lowerCaseInput.includes('cuaca')) {
                return 'Maaf, saya tidak bisa memeriksa cuaca saat ini. Coba gunakan layanan cuaca online.';
            } else if (lowerCaseInput.includes('rekomendasi film')) {
                return 'Beberapa film rekomendasi saya: "The Shawshank Redemption", "Inception", dan "Parasite".';
            } else if (lowerCaseInput.includes('musik')) {
                return 'Anda bisa mendengarkan musik di platform seperti Spotify, YouTube Music, atau Apple Music.';
            } else if (lowerCaseInput.includes('berita terbaru')) {
                return 'Anda bisa membaca berita terbaru di situs berita seperti Kompas, Detik, atau BBC Indonesia.';
            } else if (lowerCaseInput.includes('tips belajar')) {
                return 'Tips belajar efektif: buat jadwal, fokus, istirahat cukup, dan ulangi materi secara berkala.';
            } else if (lowerCaseInput.includes('resep masakan')) {
                return 'Anda bisa mencari resep masakan di situs seperti Cookpad atau YouTube. Ada banyak pilihan!';
            } else if (lowerCaseInput.includes('olahraga')) {
                return 'Olahraga teratur penting untuk kesehatan. Coba lari, bersepeda, atau yoga!';
            } else if (lowerCaseInput.includes('kamu bisa apa')) {
                return 'Saya bisa membantu menjawab pertanyaan, memberikan informasi, dan memberikan rekomendasi.';
            } else if (lowerCaseInput.includes('cerita lucu')) {
                return 'Kenapa komputer tidak bisa tenang? Karena selalu ada "badai" di dalamnya! 😄';
            } else if (lowerCaseInput.includes('kode promo')) {
                return 'Maaf, saya tidak memiliki akses ke kode promo. Coba cek situs resmi atau platform e-commerce.';
            } else if (lowerCaseInput.includes('cara membuat website')) {
                return 'Anda bisa mulai dengan belajar HTML, CSS, dan JavaScript. Banyak tutorial gratis di internet!';
            } else if (lowerCaseInput.includes('apa itu ai')) {
                return 'AI (Artificial Intelligence) adalah kecerdasan buatan yang dibuat untuk meniru kemampuan manusia.';
            } else if (lowerCaseInput.includes('apa itu machine learning')) {
                return 'Machine Learning adalah cabang AI yang memungkinkan komputer belajar dari data tanpa diprogram secara eksplisit.';
            } else {
                return 'Maaf, saya tidak mengerti pertanyaan Anda. Bisakah Anda mengulanginya?';
            }
        }
    </script>
    
</body>
</html>
