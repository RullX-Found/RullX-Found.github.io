<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - RullX</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div id="navbar"></div>

    <section class="container mx-auto py-10">
        <h1 class="text-4xl font-bold text-center mb-6">Welcome to My Game!</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-gray-800 p-4 rounded-lg">
                <img src="space.png" alt="Game Perang" class="w-full h-40 object-cover rounded-md">
                <h2 class="text-xl font-semibold mt-2">Outer Space</h2>
                <p class="text-gray-400">Rasakan pertempuran di angkasa epik dengan strategi dan aksi yang mendebarkan.</p>
                <a href="./game-space/space.html" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-lg inline-block">Mainkan</a>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <img src="game2.jpg" alt="Game 2" class="w-full h-40 object-cover rounded-md">
                <h2 class="text-xl font-semibold mt-2">Game 2</h2>
                <p class="text-gray-400">Deskripsi singkat tentang game ini.</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <img src="game3.jpg" alt="Game 3" class="w-full h-40 object-cover rounded-md">
                <h2 class="text-xl font-semibold mt-2">Game 3</h2>
                <p class="text-gray-400">Deskripsi singkat tentang game ini.</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <img src="game4.jpg" alt="Game 4" class="w-full h-40 object-cover rounded-md">
                <h2 class="text-xl font-semibold mt-2">Game 4</h2>
                <p class="text-gray-400">Deskripsi singkat tentang game ini.</p>
            </div>
        </div>
    </section>

    <script>
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            });
    </script>
</body>
</html>
